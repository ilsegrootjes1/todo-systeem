<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ilse To-do</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }

/* ── Header ── */
.header { background: white; border-bottom: 1px solid #ebebeb; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 0; }
.header h1 { font-size: 19px; font-weight: 700; }
.subdate { font-size: 12px; color: #b0b0b0; margin-top: 2px; }
.btn-add { background: #1a1a1a; color: white; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-mail-import { background: white; color: #1a1a1a; border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 7px 13px; font-size: 13px; font-weight: 600; cursor: pointer; margin-right: 8px; display: flex; align-items: center; gap: 5px; }
.btn-mail-import:hover { border-color: #1a1a1a; }
.header-actions { display: flex; align-items: center; }

/* ── Main nav ── */
.main-nav { display: flex; border-bottom: 1px solid #ebebeb; padding: 0 18px; }
.nav-tab { padding: 10px 0; margin-right: 24px; font-size: 14px; font-weight: 600; color: #b0b0b0; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
.nav-tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }

/* ── Project filter pills ── */
.proj-filters { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding: 10px 18px; }
.proj-filters::-webkit-scrollbar { display: none; }
.pill { background: #f0f0ee; border: none; border-radius: 20px; padding: 5px 13px; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; color: #6b6b6b; transition: all 0.15s; }
.pill.active { background: #1a1a1a; color: white; }

/* ── Main content ── */
.main { max-width: 700px; margin: 0 auto; padding: 16px 16px 60px; }

/* ── Task groups ── */
.group { margin-bottom: 24px; }
.group-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #c8c8c8; margin-bottom: 8px; padding: 0 2px; }
.group-label.laat  { color: #fca5a5; }
.group-label.today { color: #fdba74; }

/* ── Task card ── */
.task { background: white; border-radius: 10px; padding: 12px 13px; margin-bottom: 5px; display: flex; gap: 11px; border: 1px solid #f0f0ee; transition: opacity 0.3s, transform 0.3s; }
.task.ov { background: #fff8f8; border-color: #fde8e8; }
.task.tod { background: #fffcf4; border-color: #fef3c7; }
.task.out { opacity: 0; transform: translateX(16px); }

.check { width: 19px; height: 19px; border-radius: 50%; border: 2px solid #ddd; flex-shrink: 0; cursor: pointer; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: white; transition: all 0.15s; }
.check:hover { border-color: #aaa; }
.check.done { background: #4ade80; border-color: #4ade80; }

.task-body { flex: 1; min-width: 0; }
.task-name { font-size: 14px; font-weight: 500; line-height: 1.35; margin-bottom: 4px; }
.task-meta { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.02em; }
.b-weekmenuflyer { background: #dbeafe; color: #1d4ed8; }
.b-menuplanning  { background: #ede9fe; color: #6d28d9; }
.b-koelkast      { background: #ffedd5; color: #c2410c; }
.b-social        { background: #fce7f3; color: #be185d; }
.b-overig        { background: #f3f4f6; color: #6b7280; }
.doelw { font-size: 11px; color: #aaa; }
.dl { font-size: 11px; color: #aaa; margin-left: auto; }
.dl.laat  { color: #f87171; font-weight: 700; }
.dl.today { color: #fb923c; font-weight: 700; }
.task-note {
  display: flex;
  align-items: flex-start;
  gap: 5px;
  margin-top: 6px;
  cursor: pointer;
  padding: 5px 8px;
  background: #f8f8f6;
  border-radius: 6px;
  border-left: 2px solid #e5e5e5;
  transition: background 0.15s;
}
.task-note:hover { background: #f0f0ee; }
.task-note svg { flex-shrink: 0; margin-top: 1px; color: #9ca3af; }
.task-note-text { font-size: 12px; color: #6b7280; line-height: 1.4; word-break: break-word; }
.note-add {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 5px;
  font-size: 11px;
  color: #d1d5db;
  cursor: pointer;
  background: none;
  border: none;
  padding: 2px 0;
  transition: color 0.15s;
}
.note-add:hover { color: #9ca3af; }

/* ── Recurring badge ── */
.recur-badge { display:inline-flex; align-items:center; gap:3px; font-size:10px; font-weight:600; color:#6d28d9; background:#f5f3ff; border-radius:4px; padding:2px 6px; margin-left:4px; }

/* ── Mail proposals ── */
.proposals-section { background:white; border-radius:12px; border:1px solid #e5e7eb; overflow:hidden; margin-bottom:4px; }
.proposals-header { display:flex; align-items:center; justify-content:space-between; padding:12px 14px 10px; border-bottom:1px solid #f3f4f6; }
.proposals-header h3 { font-size:13px; font-weight:700; color:#1a1a1a; }
.proposals-header span { font-size:11px; color:#9ca3af; }
.proposal-item { display:flex; align-items:flex-start; gap:10px; padding:10px 14px; border-bottom:1px solid #f9fafb; }
.proposal-item:last-child { border-bottom:none; }
.proposal-info { flex:1; min-width:0; }
.proposal-subject { font-size:13px; font-weight:600; color:#1a1a1a; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.proposal-from { font-size:11px; color:#9ca3af; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.proposal-actions { display:flex; gap:6px; flex-shrink:0; }
.btn-proposal-add { background:#1a1a1a; color:white; border:none; border-radius:7px; padding:5px 11px; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; }
.btn-proposal-add:hover { background:#333; }
.btn-proposal-dismiss { background:white; color:#6b7280; border:1.5px solid #e5e7eb; border-radius:7px; padding:5px 9px; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; }
.btn-proposal-dismiss:hover { border-color:#9ca3af; color:#374151; }

/* ── Overzicht ── */
.overzicht { padding: 16px; max-width: 800px; margin: 0 auto; }
.ov-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; border: 1px solid #f0f0ee; }
th { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #9ca3af; padding: 12px 14px; text-align: left; border-bottom: 1px solid #f0f0ee; background: #fafafa; }
td { padding: 10px 14px; border-bottom: 1px solid #f8f8f8; vertical-align: middle; font-size: 13px; }
tr:last-child td { border-bottom: none; }
.week-cell { font-weight: 600; font-size: 13px; color: #555; white-space: nowrap; }
.week-cell.current { color: #1a1a1a; }
.current-week-row td { border-bottom: 2.5px solid #ef4444; }

.status-badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.status-badge.empty { background: #f3f4f6; color: #c4c4c4; font-style: italic; }

/* Status colors */
.s-green  { background: #dcfce7; color: #15803d; }
.s-blue   { background: #dbeafe; color: #1d4ed8; }
.s-purple { background: #ede9fe; color: #6d28d9; }
.s-orange { background: #fff7ed; color: #c2410c; }
.s-yellow { background: #fefce8; color: #a16207; }
.s-gray   { background: #f3f4f6; color: #6b7280; }
.s-sky    { background: #e0f2fe; color: #0369a1; }

/* ── Status dropdown ── */
.status-menu {
  position: fixed;
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  padding: 6px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  z-index: 300;
  min-width: 200px;
}
.status-option {
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  font-weight: 500;
}
.status-option:hover { background: #f5f5f3; }

/* ── Modal ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: white; border-radius: 20px 20px 0 0; padding: 24px 18px 44px; width: 100%; max-width: 700px; animation: up 0.22s ease; }
@keyframes up { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
.fg { margin-bottom: 13px; }
.fg label { display: block; font-size: 10px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
.fg input, .fg select, .fg textarea { width: 100%; border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 10px 11px; font-size: 15px; font-family: inherit; outline: none; background: white; color: #1a1a1a; }
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color: #1a1a1a; }
.fg textarea { resize: vertical; min-height: 70px; }
.modal-btns { display: flex; gap: 10px; margin-top: 18px; }
.btn-save { flex: 1; background: #1a1a1a; color: white; border: none; border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-cancel { background: #f3f4f6; color: #6b7280; border: none; border-radius: 10px; padding: 13px 18px; font-size: 14px; font-weight: 600; cursor: pointer; }

/* ── Mail modal ── */
.mail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px; }
.mail-overlay.open { display: flex; }
.mail-modal { background: white; border-radius: 16px; padding: 22px 20px 24px; width: 100%; max-width: 420px; }
.mail-modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.mail-subtitle { font-size: 12px; color: #aaa; margin-bottom: 16px; }
.contacts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.contact-row { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border: 1.5px solid #e5e7eb; border-radius: 8px; cursor: pointer; transition: all 0.12s; }
.contact-row.selected { border-color: #1a1a1a; background: #f9f9f9; }
.contact-check { width: 18px; height: 18px; border-radius: 4px; border: 2px solid #d1d5db; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; }
.contact-row.selected .contact-check { background: #1a1a1a; border-color: #1a1a1a; color: white; }
.contact-name { font-size: 13px; font-weight: 600; }
.contact-email { font-size: 11px; color: #aaa; margin-left: auto; }
.mail-note { margin-bottom: 16px; }
.mail-note label { display: block; font-size: 10px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
.mail-note input { width: 100%; border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 9px 11px; font-size: 14px; font-family: inherit; outline: none; }
.mail-note input:focus { border-color: #1a1a1a; }
.mail-btns { display: flex; gap: 8px; }
.btn-mail-send { flex: 1; background: #1a1a1a; color: white; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-mail-send:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-mail-cancel { background: #f3f4f6; color: #6b7280; border: none; border-radius: 10px; padding: 12px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-mail-row { background: none; border: none; cursor: pointer; color: #bbb; font-size: 18px; padding: 4px 6px; border-radius: 6px; transition: all 0.12s; line-height: 1; }
.btn-mail-row:hover { color: #1a1a1a; background: #f0f0ee; }

.empty { text-align: center; padding: 50px 20px; color: #c4c4c4; font-size: 14px; }
.toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(8px); background: #1a1a1a; color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 500; opacity: 0; transition: all 0.22s; pointer-events: none; white-space: nowrap; z-index: 400; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>To-do</h1>
      <div class="subdate" id="datum"></div>
    </div>
    <div class="header-actions">
      <button class="btn-mail-import" id="btnMailImport">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
        Uit mail
      </button>
      <button class="btn-add" id="btnAdd">+ Nieuw</button>
    </div>
  </div>
  <div class="main-nav">
    <button class="nav-tab active" data-view="taken">Taken</button>
    <button class="nav-tab" data-view="overzicht">Overzicht</button>
  </div>
  <div class="proj-filters" id="projFilters" style="display:none"></div>
</div>

<div id="viewTaken">
  <div class="main" id="mailProposals" style="display:none;max-width:700px;margin:0 auto;padding:12px 16px 0"></div>
  <div class="main" id="takenMain"><div class="empty">Laden...</div></div>
</div>

<div id="viewOverzicht" style="display:none">
  <div class="overzicht">
    <div class="ov-scroll">
      <div id="overzichtMain"><div class="empty">Laden...</div></div>
    </div>
  </div>
</div>

<!-- Add task modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Nieuwe taak</h2>
    <div class="fg"><label>Taak</label><input type="text" id="fTaak" placeholder="Wat moet je doen?" /></div>
    <div class="fg"><label>Project</label>
      <select id="fProject">
        <option value="">— Geen project —</option>
        <option value="Weekmenuflyer">Weekmenuflyer</option>
        <option value="Menuplanning">Menuplanning</option>
        <option value="Koelkast">Koelkast</option>
        <option value="Social posts">Social posts</option>
        <option value="Overig">Overig</option>
      </select>
    </div>
    <div class="fg"><label>Doelweek (optioneel)</label>
      <input type="number" id="fWeek" min="1" max="52" placeholder="bijv. 27" style="width:120px" />
      <span id="fWeekHint" style="font-size:11px;color:#9ca3af;margin-left:8px"></span>
    </div>
    <div class="fg"><label>Deadline</label><input type="date" id="fDeadline" /></div>
    <div class="fg"><label>Herhaling (optioneel)</label>
      <select id="fHerhaling">
        <option value="">— Eenmalig —</option>
        <option value="Wekelijks">Elke week</option>
        <option value="2 wekelijks">Elke 2 weken</option>
        <option value="4 wekelijks">Elke 4 weken</option>
      </select>
    </div>
    <div class="fg"><label>Opmerking (optioneel)</label><textarea id="fNote" placeholder="Extra info, links..."></textarea></div>
    <div class="modal-btns">
      <button class="btn-cancel" id="btnCancel">Annuleren</button>
      <button class="btn-save" id="btnSave">Opslaan in Notion</button>
    </div>
  </div>
</div>

<!-- Status dropdown -->
<div class="status-menu" id="statusMenu" style="display:none"></div>

<!-- Mail modal -->
<div class="mail-overlay" id="mailOverlay">
  <div class="mail-modal">
    <h3 id="mailTitle">Mail versturen</h3>
    <div class="mail-subtitle" id="mailSubtitle"></div>
    <div class="contacts" id="contactList"></div>
    <div class="mail-note">
      <label>Link (optioneel)</label>
      <input type="text" id="mailLink" placeholder="bijv. Canva link" />
    </div>
    <div class="mail-note" style="margin-top:4px">
      <label>Onderwerp</label>
      <input type="text" id="mailSubject" />
    </div>
    <div class="mail-note" style="margin-top:4px">
      <label>Bericht</label>
      <textarea id="mailBody" style="width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:10px 11px;font-size:13px;font-family:inherit;outline:none;resize:vertical;min-height:130px;line-height:1.5"></textarea>
    </div>
    <div class="mail-btns">
      <button class="btn-mail-cancel" id="btnMailCancel">Annuleren</button>
      <button class="btn-mail-send" id="btnMailSend">Verstuur</button>
    </div>
  </div>
</div>

<!-- Mail import modal -->
<div class="overlay" id="mailImportOverlay">
  <div class="modal">
    <h2>Voorstel uit mail</h2>
    <div class="fg"><label>Plak hier de tekst van je e-mail</label>
      <textarea id="mailImportText" placeholder="Kopieer de inhoud van je mail en plak hem hier..." style="min-height:140px;resize:vertical"></textarea>
    </div>
    <div id="mailImportSuggestions" style="display:none">
      <div style="font-size:12px;font-weight:600;color:#6b6b6b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Voorstel</div>
      <div style="background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:10px;padding:14px 14px 10px">
        <div class="fg" style="margin-bottom:8px"><label>Taak</label><input type="text" id="importTaak" /></div>
        <div class="fg" style="margin-bottom:8px"><label>Project</label>
          <select id="importProject">
            <option value="">— Geen project —</option>
            <option value="Weekmenuflyer">Weekmenuflyer</option>
            <option value="Menuplanning">Menuplanning</option>
            <option value="Koelkast">Koelkast</option>
            <option value="Social posts">Social posts</option>
            <option value="Overig">Overig</option>
          </select>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <div class="fg" style="margin-bottom:0;flex:0 0 auto"><label>Doelweek</label>
            <input type="number" id="importWeek" min="1" max="52" style="width:90px" />
          </div>
          <div class="fg" style="margin-bottom:0;flex:1"><label>Deadline</label><input type="date" id="importDeadline" /></div>
        </div>
        <div class="fg" style="margin-top:8px;margin-bottom:0"><label>Herhaling</label>
          <select id="importHerhaling">
            <option value="">— Eenmalig —</option>
            <option value="Wekelijks">Elke week</option>
            <option value="2 wekelijks">Elke 2 weken</option>
            <option value="4 wekelijks">Elke 4 weken</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-btns" style="margin-top:16px">
      <button class="btn-cancel" id="btnImportCancel">Annuleren</button>
      <button class="btn-save" id="btnImportAnalyse" style="background:#374151">Analyseer mail</button>
      <button class="btn-save" id="btnImportAdd" style="display:none">Toevoegen</button>
    </div>
  </div>
</div>

<!-- Edit task modal -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <h2>Taak bewerken</h2>
    <div class="fg"><label>Taak</label><input type="text" id="eTaak" /></div>
    <div class="fg"><label>Deadline</label><input type="date" id="eDeadline" /></div>
    <div class="fg"><label>Project</label>
      <select id="eProject">
        <option value="">— Geen project —</option>
        <option value="Weekmenuflyer">Weekmenuflyer</option>
        <option value="Menuplanning">Menuplanning</option>
        <option value="Koelkast">Koelkast</option>
        <option value="Social posts">Social posts</option>
        <option value="Overig">Overig</option>
      </select>
    </div>
    <div class="fg"><label>Herhaling</label>
      <select id="eHerhaling">
        <option value="">— Eenmalig —</option>
        <option value="Wekelijks">Elke week</option>
        <option value="2 wekelijks">Elke 2 weken</option>
        <option value="4 wekelijks">Elke 4 weken</option>
      </select>
    </div>
    <div class="fg"><label>Opmerking / link</label><textarea id="eNote" placeholder="bijv. Canva link, extra info..."></textarea></div>
    <div class="modal-btns">
      <button class="btn-cancel" id="btnEditCancel">Annuleren</button>
      <button class="btn-save" id="btnEditSave">Opslaan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://todo-api.ilse-grootjes.workers.dev';
let tasks = [];
let projects = {};
let projFilter = 'alles';
let currentView = 'taken';
let statusMenuTarget = null;

const todayStr = new Date().toISOString().split('T')[0];
const in7 = new Date(Date.now() + 7*864e5).toISOString().split('T')[0];
const D = ['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'];
const M = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
const MS = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
const now = new Date();
document.getElementById('datum').textContent = `${D[now.getDay()]} ${now.getDate()} ${M[now.getMonth()]}`;

// ── Project status options ──
const STATUS_OPTIONS = {
  weekmenuflyer: ['Nog niet begonnen','Wachtend op GO Pieter','Bezig','Klaar voor proofread','Besteld','Geleverd'],
  koelkast: ['Nog niet begonnen','Wachtend op GO Pieter','Bezig','Product informatie verwerkt','Bestelling geplaatst','Klaar'],
  menuplanning: ['Menu gemaakt','Pieter GO','Menu klaargezet in Shop','Live gegaan'],
};

function statusClass(s) {
  if (!s) return 'empty';
  const green  = ['Geleverd','Live gegaan','Klaar'];
  const blue   = ['Besteld','Bestelling geplaatst'];
  const purple = ['Klaar voor proofread'];
  const orange = ['Bezig','Product informatie verwerkt'];
  const yellow = ['Wachtend op GO Pieter','Pieter GO'];
  const sky    = ['Menu gemaakt','Menu klaargezet in Shop'];
  if (green.includes(s))  return 's-green';
  if (blue.includes(s))   return 's-blue';
  if (purple.includes(s)) return 's-purple';
  if (orange.includes(s)) return 's-orange';
  if (yellow.includes(s)) return 's-yellow';
  if (sky.includes(s))    return 's-sky';
  return 's-gray';
}

function weekNum(wStr) {
  const m = wStr.match(/\d+/);
  return m ? parseInt(m[0]) : 999;
}

function weekDates(wStr) {
  const n = weekNum(wStr);
  if (n === 999) return '';
  // ISO week N Monday for 2026
  const jan4 = new Date(2026, 0, 4);
  const jan4Day = jan4.getDay() || 7;
  const monday = new Date(jan4);
  monday.setDate(jan4.getDate() - (jan4Day - 1) + (n - 1) * 7);
  // Menu week starts Friday = Monday - 3 days
  const fri = new Date(monday); fri.setDate(monday.getDate() - 3);
  const thu = new Date(fri);    thu.setDate(fri.getDate() + 6);
  const fmt = d => `${d.getDate()} ${MS[d.getMonth()]}`;
  return `vr ${fmt(fri)} – do ${fmt(thu)}`;
}

function isLate(d)  { return d && d < todayStr; }
function isToday(d) { return d === todayStr; }
function isWeek(d)  { return d && d > todayStr && d <= in7; }

function fmtDate(d) {
  if (!d) return '';
  const [,m,day] = d.split('-');
  return `${parseInt(day)} ${MS[parseInt(m)-1]}`;
}

function badgeClass(p) {
  return { 'Weekmenuflyer':'b-weekmenuflyer','Menuplanning':'b-menuplanning','Koelkast':'b-koelkast','Social posts':'b-social','Overig':'b-overig' }[p] || 'b-overig';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderProjFilters() {
  const projs = [...new Set(tasks.map(t => t.project).filter(Boolean))];
  const all = [{ id: 'alles', label: 'Alles' }, ...projs.map(p => ({ id: p, label: p }))];
  document.getElementById('projFilters').innerHTML = all.map(f =>
    `<button class="pill${projFilter === f.id ? ' active' : ''}" data-p="${f.id}">${f.label}</button>`
  ).join('');
  document.querySelectorAll('.pill').forEach(b =>
    b.addEventListener('click', () => { projFilter = b.dataset.p; renderTaken(); })
  );
  document.getElementById('projFilters').style.display = 'flex';
}

function renderTaken() {
  renderProjFilters();
  const list = projFilter === 'alles' ? tasks : tasks.filter(t => t.project === projFilter);

  const late  = list.filter(t => isLate(t.deadline));
  const today = list.filter(t => isToday(t.deadline));
  const week  = list.filter(t => isWeek(t.deadline));
  const later = list.filter(t => !t.deadline || t.deadline > in7);

  const groups = [];
  if (late.length)  groups.push({ label: `Te laat — ${late.length} ${late.length===1?'taak':'taken'}`, cls:'laat',  list: late });
  if (today.length) groups.push({ label: 'Vandaag',          cls:'today', list: today });
  if (week.length)  groups.push({ label: 'Komende 7 dagen',  cls:'',      list: week });
  if (later.length) groups.push({ label: 'Later',            cls:'',      list: later });

  if (!groups.length) {
    document.getElementById('takenMain').innerHTML = '<div class="empty">Geen taken</div>';
    return;
  }

  document.getElementById('takenMain').innerHTML = groups.map(g => `
    <div class="group">
      <div class="group-label ${g.cls}">${g.label}</div>
      ${g.list.map(taskCard).join('')}
    </div>
  `).join('');

  document.querySelectorAll('.check').forEach(el =>
    el.addEventListener('click', () => markDone(el.dataset.id, el))
  );
  document.querySelectorAll('[data-taskid]').forEach(el =>
    el.addEventListener('click', () => {
      const t = tasks.find(x => x.id === el.dataset.taskid);
      if (t) openMailModal(t.doelweek || t.taak, t.taak);
    })
  );
  document.querySelectorAll('[data-editid]').forEach(el =>
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const t = tasks.find(x => x.id === el.dataset.editid);
      if (t) openEditModal(t);
    })
  );
}

function taskCard(t) {

  return `<div class="task${ov?' ov':tod?' tod':''}" id="c-${t.id}">

    <div class="task-body">

// ── Overzicht view ──
function currentISOWeek() {
  const now = new Date();
  const jan4 = new Date(now.getFullYear(), 0, 4);
  const jan4Day = jan4.getDay() || 7;
  const monday = new Date(jan4);
  monday.setDate(jan4.getDate() - (jan4Day - 1));
  return Math.floor((now - monday) / (7 * 864e5)) + 1;
}

function renderOverzicht() {
  if (!Object.keys(projects).length) return;

  // Build lookup maps keyed by week number (normalise capitalisation/format)
  const map = {};
  ['weekmenuflyer','koelkast','menuplanning'].forEach(k => {
    map[k] = {};
    (projects[k] || []).forEach(e => {
      const n = weekNum(e.week);
      if (n !== 999 && !map[k][n]) map[k][n] = e; // first entry wins for duplicates
    });
  });

  const curWeek = currentISOWeek();
  const maxWeek = Math.max(36, curWeek + 10);
  const cutoff = curWeek + 4; // rows beyond this are collapsed by default

  const rows = [];
  for (let wn = 15; wn <= maxWeek; wn++) {
    const isCurrent = wn === curWeek;
    const isPast = wn < curWeek;
    const isFar = wn > cutoff;
    let rowClass = isCurrent ? 'current-week-row' : '';
    if (isFar) rowClass += (rowClass ? ' ' : '') + 'far-future-row';
    const rowAttr = rowClass ? ` class="${rowClass}"` : '';
    const cellClass = isCurrent ? ' current' : '';
    const cells = ['weekmenuflyer','koelkast','menuplanning'].map(k => {
      const entry = map[k][wn];
      const s = entry?.status || null;
      if (s) return `<td><span class="status-badge ${statusClass(s)}">${esc(s)}</span></td>`;
      if (isPast || isCurrent) return `<td><span class="status-badge s-green">Klaar</span></td>`;
      return `<td></td>`;
    }).join('');

    // Insert toggle row at the cutoff boundary
    if (wn === cutoff + 1) {
      rows.push(`<tr class="overzicht-toggle-row" id="overzichtToggle">
        <td colspan="4" style="text-align:center;padding:8px 0;cursor:pointer;color:#9ca3af;font-size:12px;user-select:none" onclick="toggleFarFuture(this)">
          ▼ Toon weken verder dan +4
        </td>
      </tr>`);
    }

    rows.push(`<tr${rowAttr} style="${isFar ? 'display:none' : ''}">
      <td class="week-cell${cellClass}">
        <div>Week ${wn}</div>
        <div style="font-size:10px;color:#bbb;font-weight:400;margin-top:1px">${weekDates(`Week ${wn}`)}</div>
      </td>
      ${cells}
    </tr>`);
  }

  document.getElementById('overzichtMain').innerHTML = `
    <table>
      <thead><tr>
        <th>Week</th>
        <th style="color:#1d4ed8">Weekmenuflyer</th>
        <th style="color:#6d28d9">Menuplanning</th>
        <th style="color:#c2410c">Koelkast</th>
      </tr></thead>
      <tbody>${rows.join('')}</tbody>
    </table>
  `;
}

function toggleFarFuture(btn) {
  const rows = document.querySelectorAll('.far-future-row');
  const isHidden = rows[0]?.style.display === 'none';
  rows.forEach(r => r.style.display = isHidden ? '' : 'none');
  btn.textContent = isHidden ? '▲ Verberg weken verder dan +4' : '▼ Toon weken verder dan +4';
}

function thursdayOfMenuWeek(n) {
  const jan4 = new Date(2026, 0, 4);
  const jan4Day = jan4.getDay() || 7;
  const monday = new Date(jan4);
  monday.setDate(jan4.getDate() - (jan4Day - 1) + (n - 1) * 7);
  const thu = new Date(monday);
  thu.setDate(monday.getDate() + 3);
  return `${thu.getFullYear()}-${String(thu.getMonth()+1).padStart(2,'0')}-${String(thu.getDate()).padStart(2,'0')}`;
}

    document.getElementById('fDeadline').value = d;
    document.getElementById('fWeekHint').textContent = weekDates(`Week ${n}`);

// ── Mail import modal ──
const NL_MONTHS = {jan:1,feb:2,mrt:3,apr:4,mei:5,jun:6,jul:7,aug:8,sep:9,okt:10,nov:11,dec:12,
  januari:1,februari:2,maart:3,april:4,mei:5,juni:6,juli:7,augustus:8,september:9,oktober:10,november:11,december:12};

function parseEmail(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);

  // Task name: subject line preferred, else first real sentence
  let taskName = '';
  const subjectLine = lines.find(l => /^(onderwerp|subject)\s*:/i.test(l));
  taskName = subjectLine ? subjectLine.replace(/^(onderwerp|subject)\s*:\s*/i,'').trim() : (lines[0] || '');

  // Week number
  let week = null;
  const wm = text.match(/week\s+(\d+)/i);
  if (wm) week = parseInt(wm[1]);

  // Deadline: look for "dd maand" or "dd/mm" or "dd-mm"
  let deadline = '';
  const dmMatch = text.match(/(\d{1,2})\s+(januari|februari|maart|april|mei|juni|juli|augustus|september|oktober|november|december|jan|feb|mrt|apr|jun|jul|aug|sep|okt|nov|dec)/i);
  if (dmMatch) {
    const day = parseInt(dmMatch[1]);
    const mon = NL_MONTHS[dmMatch[2].toLowerCase()];
    if (mon) deadline = `2026-${String(mon).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  } else {
    const numMatch = text.match(/(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/);
    if (numMatch) {
      const day = parseInt(numMatch[1]), mon = parseInt(numMatch[2]);
      const yr  = numMatch[3] ? (parseInt(numMatch[3]) < 100 ? 2000+parseInt(numMatch[3]) : parseInt(numMatch[3])) : 2026;
      deadline = `${yr}-${String(mon).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    }
  }
  if (!deadline && week) deadline = thursdayOfMenuWeek(week);

  // Project from keywords
  let project = '';
  const lower = text.toLowerCase();
  if (lower.includes('flyer')) project = 'Weekmenuflyer';
  else if (lower.includes('koelkast') || lower.includes('productinformatie') || lower.includes('bestell')) project = 'Koelkast';
  else if (lower.includes('menu') || lower.includes('import') || lower.includes('menucheck')) project = 'Menuplanning';
  else if (lower.includes('instagram') || lower.includes('social') || lower.includes('post') || lower.includes('video')) project = 'Social posts';

  return { taskName, week, project, deadline };
}

  { name: 'Pieter',  email: 'Pieter@thuysvers.nl' },
];

let mailWeek = '';
let mailTask = '';
let selectedContacts = new Set();

function greeting(indices) {
  const names = [...indices].map(i => CONTACTS[i].name);
  if (!names.length) return 'Hey,';
  if (names.length === 1) return `Hey ${names[0]},`;
  return `Hey ${names.slice(0,-1).join(', ')} en ${names[names.length-1]},`;
}

function generateTemplate() {
  const g = greeting(selectedContacts);
  const tl = mailTask.toLowerCase();
  const wn = mailWeek ? weekNum(mailWeek) : null;
  const wi = wn ? `week ${wn} (${weekDates(`Week ${wn}`)})` : '';
  const link = document.getElementById('mailLink').value.trim();
  let body = '';
  if (tl.includes('nieuw menu') || tl.includes('menu maken')) {
    body = `${g}\n\nIk heb het menu${wi ? ' voor ' + wi : ''} gemaakt. Zou jij hier even naar willen kijken en een go willen geven als het klaar is?`;
  } else if (tl.includes('weekmenuflyer') || tl.includes('flyer')) {
    body = `${g}\n\nDe weekmenuflyer${wi ? ' voor ' + wi : ''} staat klaar voor proofread. Zou jij er even naar willen kijken?`;
  } else if (tl.includes('koelkast') || tl.includes('productinformatie')) {
    body = `${g}\n\nDe productinformatie${wi ? ' voor ' + wi : ''} staat klaar. Zou jij dit even willen controleren?`;
  } else {
    body = `${g}\n\nKunnen jullie even kijken naar: ${mailTask}${wi ? ' (' + wi + ')' : ''}?`;
  }
  if (link) body += `\n\n${link}`;
  body += '\n\nAlvast bedankt!\nIlse';
  return body;
}

function generateSubject() {
  const tl = mailTask.toLowerCase();
  const wn = mailWeek ? ` week ${weekNum(mailWeek)}` : '';
  if (tl.includes('nieuw menu') || tl.includes('menu maken')) return `Go-check: menu${wn}`;
  if (tl.includes('weekmenuflyer') || tl.includes('flyer')) return `Proofread: weekmenuflyer${wn}`;
  return `${mailTask}${wn}`;
}

function updateMailCompose() {
  if (selectedContacts.size > 0) {
    document.getElementById('mailBody').value = generateTemplate();
    document.getElementById('mailSubject').value = generateSubject();
  }
}

function openMailModal(week, taskTitle) {
  mailWeek = week || '';
  mailTask = taskTitle || '';
  selectedContacts = new Set();
  document.getElementById('mailTitle').textContent = taskTitle || (week ? `Mail over ${week}` : 'Mail versturen');
  document.getElementById('mailSubtitle').textContent = week ? weekDates(week) : '';
  document.getElementById('mailLink').value = '';
  document.getElementById('mailBody').value = '';
  document.getElementById('mailSubject').value = '';

  document.getElementById('contactList').innerHTML = CONTACTS.map((c,i) => `
    <div class="contact-row" data-ci="${i}">
      <div class="contact-check" id="cc-${i}"></div>
      <div class="contact-name">${c.name}</div>
      <div class="contact-email">${c.email}</div>
    </div>
  `).join('');

  document.querySelectorAll('.contact-row').forEach(row => {
    row.addEventListener('click', () => {
      const i = parseInt(row.dataset.ci);
      if (selectedContacts.has(i)) {
        selectedContacts.delete(i);
        row.classList.remove('selected');
        document.getElementById(`cc-${i}`).textContent = '';
      } else {
        selectedContacts.add(i);
        row.classList.add('selected');
        document.getElementById(`cc-${i}`).textContent = '✓';
      }
      document.getElementById('btnMailSend').disabled = selectedContacts.size === 0;
      updateMailCompose();
    });
  });

  document.getElementById('mailLink').addEventListener('input', () => {
    if (selectedContacts.size > 0) updateMailCompose();
  });

  document.getElementById('btnMailSend').disabled = true;
  document.getElementById('mailOverlay').classList.add('open');
}

document.getElementById('btnMailCancel').onclick = () => {
  document.getElementById('mailOverlay').classList.remove('open');
};
document.getElementById('mailOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('mailOverlay'))
    document.getElementById('mailOverlay').classList.remove('open');
});

document.getElementById('btnMailSend').onclick = async () => {
  const btn = document.getElementById('btnMailSend');
  btn.textContent = 'Versturen...'; btn.disabled = true;
  const to = [...selectedContacts].map(i => CONTACTS[i].email);
  const subject = document.getElementById('mailSubject').value.trim();
  const text = document.getElementById('mailBody').value.trim();
  try {
    const res = await fetch(`${API}/email`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to, subject, text }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Mislukt');
    document.getElementById('mailOverlay').classList.remove('open');
    toast('Mail verstuurd!');
  } catch(e) {
    toast(`Versturen mislukt: ${e.message}`);
    btn.textContent = 'Verstuur'; btn.disabled = false;
  }
};

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Gmail proposals ──
async function loadProposals() {
  const el = document.getElementById('mailProposals');
  try {
    const r = await fetch(`${API}/gmail/proposals`);
    if (r.status === 401) { el.style.display = 'none'; return; }
    const proposals = await r.json();
    if (!proposals.length) { el.style.display = 'none'; return; }
    el.style.display = '';
    el.innerHTML = `<div class="proposals-section">
      <div class="proposals-header">
        <h3>Voorstellen uit mail</h3>
        <span>${proposals.length} ongelezen</span>
      </div>
      ${proposals.map(p => `
        <div class="proposal-item" id="prop-${p.gmailId}">
          <div class="proposal-info">
            <div class="proposal-subject">${esc(p.taskSuggestion)}</div>
            <div class="proposal-from">${esc(p.from)} · ${esc(p.subject)}</div>
          </div>
          <div class="proposal-actions">
            <button class="btn-proposal-dismiss" data-gmailid="${p.gmailId}">Weigeren</button>
            <button class="btn-proposal-add" data-task="${esc(p.taskSuggestion)}" data-gmailid="${p.gmailId}">Invoegen</button>
          </div>
        </div>`).join('')}
    </div>`;

    el.querySelectorAll('.btn-proposal-dismiss').forEach(btn => {
      btn.addEventListener('click', async () => {
        document.getElementById(`prop-${btn.dataset.gmailid}`)?.remove();
        if (!el.querySelectorAll('.proposal-item').length) el.style.display = 'none';
        await fetch(`${API}/gmail/dismiss/${btn.dataset.gmailid}`, { method: 'POST' });
      });
    });
    el.querySelectorAll('.btn-proposal-add').forEach(btn => {
      btn.addEventListener('click', async () => {
        document.getElementById('fTaak').value = btn.dataset.task;
        document.getElementById('overlay').classList.add('open');
        setTimeout(() => document.getElementById('fTaak').focus(), 50);
        await fetch(`${API}/gmail/dismiss/${btn.dataset.gmailid}`, { method: 'POST' });
        document.getElementById(`prop-${btn.dataset.gmailid}`)?.remove();
        if (!el.querySelectorAll('.proposal-item').length) el.style.display = 'none';
      });
    });
  } catch { el.style.display = 'none'; }
}

// ── Init ──
loadTasks();
loadProposals();
setInterval(loadTasks, 5 * 60 * 1000);
setInterval(loadProposals, 10 * 60 * 1000);
</script>
